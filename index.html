<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - GW Pathshala</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #06020f; /* Gehra kala-purple background */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 420px;
            width: 90%;
            padding: 20px;
        }
        h1 {
            font-size: 42px;
            font-weight: bold;
            color: #d161ff;
            text-shadow: 0 0 20px rgba(209, 97, 255, 0.8), 0 0 40px rgba(209, 97, 255, 0.4);
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .welcome-text {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        /* Telegram Button with your link */
        .tg-btn {
            display: inline-block;
            background: transparent;
            color: #b546ff;
            border: 2px solid #3c165a;
            padding: 10px 30px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 35px;
            box-shadow: 0 0 15px rgba(181, 70, 255, 0.1);
            transition: all 0.3s ease;
        }
        .tg-btn:hover {
            border-color: #b546ff;
            box-shadow: 0 0 20px rgba(181, 70, 255, 0.4);
            color: #fff;
        }
        .main-card {
            background: #0d071a;
            border-radius: 24px;
            padding: 30px 25px;
            border: 1px solid #1a0f30;
            box-shadow: 0 0 35px rgba(181, 70, 255, 0.15);
        }
        .card-header {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .duration-text {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }
        .duration-text span {
            color: #3b82f6;
            font-weight: bold;
        }
        .slider-container {
            margin-bottom: 30px;
            padding: 0 10px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #3b82f6;
            height: 6px;
            background: #fff;
            border-radius: 5px;
            outline: none;
        }
        .gen-btn {
            background: #be5eff;
            color: #fff;
            border: none;
            padding: 15px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(190, 94, 255, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .gen-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px rgba(190, 94, 255, 0.8);
        }
        .loader {
            display: none;
            margin-top: 20px;
            font-size: 14px;
            color: #be5eff;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .key-box {
            display: none;
            margin-top: 25px;
            background: #06020f;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #be5eff;
            box-shadow: 0 0 15px rgba(190, 94, 255, 0.2);
        }
        .key-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #120924;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .key-text {
            font-size: 18px;
            font-family: monospace;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .copy-btn {
            background: #be5eff;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-text {
            font-size: 12px;
            color: #be5eff;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Drip Client</h1>
    <div class="tagline">Cracked Version</div>
    <div class="welcome-text">Welcome to GW Pathshala</div>
    
    <a href="https://t.me/GwPathshala" target="_blank" class="tg-btn">JOIN TELEGRAM</a>
    
    <div class="main-card">
        <div class="card-header">
            <span>🔑</span> GENERATE KEY
        </div>
        
        <div class="duration-text">
            Duration: <span id="daysValue">7 days</span>
        </div>
        
        <div class="slider-container">
            <input type="range" id="daysSlider" min="1" max="30" value="7" oninput="updateDays(this.value)">
        </div>
        
        <button class="gen-btn" id="actionBtn" onclick="processKey()">Generate Key</button>
        
        <div class="loader" id="loader">GENERATING KEY... PLEASE WAIT</div>
        
        <div class="key-box" id="keyBox">
            <div class="key-wrapper">
                <span class="key-text" id="keyValue">LOADING...</span>
                <button class="copy-btn" onclick="copyKey()">COPY</button>
            </div>
            <div class="status-text" id="statusText">* PREMIUM ACCESS GRANTED FOR 7 DAYS *</div>
        </div>
    </div>
</div>

<script>
    function updateDays(val) {
        document.getElementById("daysValue").innerText = val + " days";
    }

    function processKey() {
        var loader = document.getElementById("loader");
        var keyBox = document.getElementById("keyBox");
        var keyValue = document.getElementById("keyValue");
        var statusText = document.getElementById("statusText");
        
        keyBox.style.display = "none";
        loader.style.display = "block";
        
        setTimeout(function() {
            loader.style.display = "none";
            
            // 🤖 10 digit automatic key generator
            var randomKey = "";
            randomKey += Math.floor(Math.random() * 9) + 1; 
            for (var i = 0; i < 9; i++) {
                randomKey += Math.floor(Math.random() * 10);
            }
            
            var selectedDays = document.getElementById("daysSlider").value;
            
            keyValue.innerText = randomKey;
            statusText.innerText = "* PREMIUM ACCESS GRANTED FOR " + selectedDays + " DAYS *";
            
            keyBox.style.display = "block";
        }, 1200);
    }

    function copyKey() {
        var keyText = document.getElementById("keyValue").innerText;
        navigator.clipboard.writeText(keyText);
        alert("Key Copied: " + keyText);
    }
</script>

</body>
</html>
