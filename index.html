<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client Key Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* पर्पल और डार्क बैकग्राउंड थीम */
            background-color: #0b071e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 010101 कोडिंग/मैट्रिक्स बैकग्राउंड पैटर्न - पर्पल और पिंक ओपेसिटी के साथ */
        body::before {
            content: "01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011 01010110 01001101 01010101 01100011";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            font-family: monospace;
            font-size: 14px;
            line-height: 22px;
            color: rgba(255, 0, 128, 0.04); /* नियॉन पिंक टच */
            text-shadow: 0 0 2px rgba(157, 0, 255, 0.15); /* पर्पल ग्लो */
            word-break: break-all;
            padding: 10px;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .container {
            background: rgba(18, 11, 41, 0.85); /* डार्क पर्पल कार्ड */
            backdrop-filter: blur(12px);
            border: 2px solid #ff007f; /* नियॉन पिंक बॉर्डर */
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.3), inset 0 0 15px rgba(157, 0, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 5px;
            color: #ff007f; /* नियॉन पिंक */
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 13px;
            color: #b0a8d3;
            margin-bottom: 25px;
        }

        /* Slider Section (Purple/Pink Theme) */
        .plan-section {
            background: rgba(157, 0, 255, 0.05);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 0, 127, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .plan-label {
            font-size: 14px;
            margin-bottom: 12px;
            display: block;
            color: #ff007f;
            font-weight: 500;
        }

        .slider-container {
            position: relative;
            margin-bottom: 12px;
        }

        .slider {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 5px;
            background: #251f47;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ff007f; /* पिंक थंब */
            cursor: pointer;
            box-shadow: 0 0 12px #ff007f;
            transition: transform 0.1s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .days-display {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, rgba(255, 0, 127, 0.3), rgba(157, 0, 255, 0.3));
            padding: 6px 16px;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid rgba(255, 0, 127, 0.4);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        /* Generate Key Button */
        .main-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #9d00ff 0%, #ff007f 100%); /* पर्पल टू पिंक ग्रेडिएंट */
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease;
        }

        .main-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.7);
        }

        /* MODAL POPUP STYLING */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 3, 15, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #120b29;
            border: 2px solid #ff007f;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .modal-overlay.open .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-size: 20px;
            color: #ff007f;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .task-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-youtube { border-left: 4px solid #ff0000; }
        .btn-telegram { border-left: 4px solid #0088cc; }
        .btn-whatsapp { border-left: 4px solid #25d366; }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
        }

        .status-dot.done {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* KEY BOX DESIGN */
        .key-display-box {
            background: #070412;
            border: 1px dashed #ff007f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.1);
        }

        .key-title {
            font-size: 12px;
            color: #b0a8d3;
            margin-bottom: 5px;
        }

        .key-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .generated-key {
            font-size: 22px;
            font-weight: bold;
            color: #2ecc71;
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(46, 204, 113, 0.4);
        }

        .copy-btn {
            background: #ff007f;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #e00070;
        }

        .close-modal {
            margin-top: 15px;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>VIP Key Center</h2>
    <p class="sub-text">दिन सेलेक्ट करें और अपनी प्रीमियम Key जनरेट करें</p>

    <div class="plan-section">
        <span class="plan-label">वैलिडिटी चुनें:</span>
        <div class="slider-container">
            <input type="range" min="1" max="4" value="1" class="slider" id="daysSlider" oninput="updateDays()">
        </div>
        <span class="days-display" id="daysValue">3 Days</span>
    </div>

    <button class="main-btn" onclick="openPopup()">Generate Key</button>
</div>

<div class="modal-overlay" id="taskModal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Complete Tasks</div>
        <p style="font-size: 12px; color: #b0a8d3; margin-bottom: 15px;">Key अनलॉक करने के लिए नीचे दिए गए तीनों टास्क पूरे करें</p>

        <div class="task-list">
            <a href="https://youtu.be/xbDTQqK13TQ?si=WtAFwqsF2gDwBSY6" target="_blank" class="task-btn btn-youtube" onclick="completeTask('yt')">
                <span>🔴 YouTube Subscribe</span>
                <span class="status-dot" id="yt-dot"></span>
            </a>

            <a href="https://t.me/GwPathshala" target="_blank" class="task-btn btn-telegram" onclick="completeTask('tg')">
                <span>🔵 Join Telegram Channel</span>
                <span class="status-dot" id="tg-dot"></span>
            </a>

            <a href="https://youtu.be/lWQBNSQTAo0?si=PMWoQUa86HRDhGEO" target="_blank" class="task-btn btn-whatsapp" onclick="completeTask('wa')">
                <span>🟢 Watch & Share Video</span>
                <span class="status-dot" id="wa-dot"></span>
            </a>
        </div>

        <div class="key-display-box" id="keyBox">
            <div class="key-title">आपकी प्रीमियम Client Key जनरेट हो चुकी है:</div>
            <div class="key-row">
                <span class="generated-key" id="keyNum">----------------</span>
                <button class="copy-btn" onclick="copyKey()">Copy</button>
            </div>
        </div>

        <button class="close-modal" onclick="closePopup()">बंद करें (Cancel)</button>
    </div>
</div>

<script>
    let selectedPlan = "3 Days";
    let tasks = { yt: false, tg: false, wa: false };

    // 20 असली न्यूमेरिक कीज़ का पूल
    const keyPool = [
        "1137324396", "2489510374", "5931048267", "8104729563", "3571920486",
        "7204918356", "1948263750", "6305814972", "4729105836", "8593021476",
        "3104859267", "9264817350", "5481923076", "2074819365", "6830154927",
        "1493027586", "7392048156", "5820491367", "4910382756", "8204917364"
    ];

    function updateDays() {
        let val = document.getElementById('daysSlider').value;
        let daysText = "3 Days";
        if(val == 2) daysText = "7 Days";
        if(val == 3) daysText = "15 Days";
        if(val == 4) daysText = "30 Days";
        
        selectedPlan = daysText;
        document.getElementById('daysValue').innerText = daysText;
    }

    function openPopup() {
        tasks = { yt: false, tg: false, wa: false };
        document.getElementById('yt-dot').classList.remove('done');
        document.getElementById('tg-dot').classList.remove('done');
        document.getElementById('wa-dot').classList.remove('done');
        document.getElementById('keyBox').style.display = 'none';
        
        document.getElementById('modalTitle').innerText = `${selectedPlan} Key Generation`;
        document.getElementById('taskModal').classList.add('open');
    }

    function closePopup() {
        document.getElementById('taskModal').classList.remove('open');
    }

    function completeTask(taskName) {
        setTimeout(() => {
            tasks[taskName] = true;
            document.getElementById(`${taskName}-dot`).classList.add('done');
            checkTasks();
        }, 1200);
    }

    function checkTasks() {
        if (tasks.yt && tasks.tg && tasks.wa) {
            let randomIndex = Math.floor(Math.random() * keyPool.length);
            let finalKey = keyPool[randomIndex];
            
            document.getElementById('keyNum').innerText = finalKey;
            document.getElementById('keyBox').style.display = 'block';
        }
    }

    function copyKey() {
        let keyText = document.getElementById('keyNum').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            alert("✅ Key सफलतापूर्वक कॉपी हो गई है: " + keyText);
        }).catch(err => {
            alert("कॉपी करने में दिक्कत हुई, कृपया मैन्युअल देख लें।");
        });
    }
</script>

</body>
</html>
