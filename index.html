
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIP CLIENT -GW PATHSHALA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #060311;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 0101 matrix falling background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .main-title {
            font-size: 40px;
            font-weight: bold;
            color: #7b99ff;
            text-shadow: 0 0 25px rgba(123, 153, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 12px;
            color: #5d5675;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* Select Plan Header */
        .plan-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #a4a0ba;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Grid Selection Layout as per Image 1 */
        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .plan-box {
            background: transparent;
            border: 2px solid transparent;
            color: #8c86a5;
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Selected Active State */
        .plan-box.active {
            border-color: #2b61bd;
            color: #3b9eff;
            background: rgba(43, 97, 189, 0.05);
            box-shadow: 0 0 15px rgba(59, 158, 255, 0.3);
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: #a9bfff;
            border: none;
            border-radius: 50px;
            color: #384260;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(169, 191, 255, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .generate-btn:hover {
            box-shadow: 0 0 30px rgba(169, 191, 255, 0.6);
            transform: scale(1.01);
        }

        /* Verified Key Box Container */
        .verified-card {
            border: 2px solid #00f2fe;
            border-radius: 20px;
            padding: 22px 16px;
            background: #070413;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
            display: none;
            margin-top: 10px;
        }

        .verified-title {
            color: #00f2fe;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .key-inner-wrapper {
            border: 1px solid #231f38;
            background: #0d0a1f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .key-number {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 15px;
        }

        .copy-action-btn {
            background: #00f2fe;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-bar {
            font-size: 11px;
            color: #726b8e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-bar span {
            color: #00f2fe;
            font-weight: bold;
        }

        /* MODAL POPUP */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 1, 8, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .popup-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-box {
            background: #0a0618;
            border: 2px solid #7b99ff;
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 35px rgba(123, 153, 255, 0.3);
            transform: scale(0.85);
            transition: all 0.3s ease;
        }

        .popup-overlay.open .popup-box {
            transform: scale(1);
        }

        .popup-header {
            font-size: 18px;
            font-weight: bold;
            color: #7b99ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .task-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(123, 153, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
        }

        .status-indicator.done {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .close-txt {
            display: inline-block;
            margin-top: 12px;
            color: #ff4d4d;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="main-container">
    <div class="main-title">DRIP CLIENT</div>
    <div class="subtitle">CRACKED VERSION • GW PATHSHALA</div>

    <div class="plan-header">⚙️ SELECT VALIDITY PLAN</div>
    
    <div class="plan-grid">
        <button class="plan-box" onclick="selectPlan(this, '3 DAYS')">3 DAYS PLAN</button>
        <button class="plan-box active" onclick="selectPlan(this, '7 DAYS')">7 DAYS PLAN</button>
        <button class="plan-box" onclick="selectPlan(this, '15 DAYS')">15 DAYS PLAN</button>
        <button class="plan-box" onclick="selectPlan(this, '30 DAYS')">30 DAYS PLAN</button>
    </div>

    <button class="generate-btn" onclick="triggerTasks()">Generate Key</button>

    <div class="verified-card" id="verifiedBox">
        <div class="verified-title">🔥 GW PATHSHALA OFFICIALLY VERIFIED ✓</div>
        <div class="key-inner-wrapper">
            <div class="key-number" id="keyNum">----------</div>
            <button class="copy-action-btn" onclick="copyKeyText()">📄 COPY VERIFIED KEY</button>
        </div>
        <div class="status-bar">PLAN STATUS: <span id="statusText">7 DAYS</span> PREMIUM ACCESS ACTIVE</div>
    </div>
</div>

<div class="popup-overlay" id="taskPopup">
    <div class="popup-box">
        <div class="popup-header">Complete All Tasks</div>
        
        <div class="task-container">
            <a href="https://youtu.be/xbDTQqK13TQ?si=WtAFwqsF2gDwBSY6" target="_blank" class="task-row" onclick="completeTaskStep('yt')">
                <span>🔴 YouTube Channel Subscribe</span>
                <span class="status-indicator" id="yt-indicator"></span>
            </a>
            <a href="https://t.me/GwPathshala" target="_blank" class="task-row" onclick="completeTaskStep('tg')">
                <span>🔵 Join Telegram Channel</span>
                <span class="status-indicator" id="tg-indicator"></span>
            </a>
            <a href="https://youtu.be/lWQBNSQTAo0?si=PMWoQUa86HRDhGEO" target="_blank" class="task-row" onclick="completeTaskStep('wa')">
                <span>🟢 Watch & Share Video</span>
                <span class="status-indicator" id="wa-indicator"></span>
            </a>
        </div>

        <span class="close-txt" onclick="closeTaskWindow()">Cancel</span>
    </div>
</div>

<script>
    let chosenPlan = "7 DAYS";
    let taskStatus = { yt: false, tg: false, wa: false };

    const keysPool = [
        "1137324396", "2489510374", "5931048267", "8104729563", "3571920486",
        "7204918356", "1948263750", "6305814972", "4729105836", "8593021476",
        "3104859267", "9264817350", "5481923076", "2074819365", "6830154927",
        "1493027586", "7392048156", "5820491367", "4910382756", "8204917364"
    ];

    // 0101 मैट्रिक्स रेन स्क्रिप्ट
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    function adjustCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    adjustCanvasSize();
    window.addEventListener('resize', adjustCanvasSize);

    const charList = "01";
    const sizeOfFont = 14;
    const totalCols = canvas.width / sizeOfFont;
    const drops = Array(Math.floor(totalCols)).fill(1);

    function animateMatrix() {
        ctx.fillStyle = 'rgba(6, 3, 17, 0.1)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(123, 153, 255, 0.12)'; 
        ctx.font = sizeOfFont + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const char = charList.charAt(Math.floor(Math.random() * charList.length));
            ctx.fillText(char, i * sizeOfFont, drops[i] * sizeOfFont);

            if (drops[i] * sizeOfFont > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }
    setInterval(animateMatrix, 33);

    // प्लान सिलेक्शन फंक्शन
    function selectPlan(element, planName) {
        document.querySelectorAll('.plan-box').forEach(box => box.classList.remove('active'));
        element.classList.add('active');
        chosenPlan = planName;
    }

    function triggerTasks() {
        taskStatus = { yt: false, tg: false, wa: false };
        document.getElementById('yt-indicator').classList.remove('done');
        document.getElementById('tg-indicator').classList.remove('done');
        document.getElementById('wa-indicator').classList.remove('done');
        document.getElementById('verifiedBox').style.display = 'none';

        document.getElementById('taskPopup').classList.add('open');
    }

    function closeTaskWindow() {
        document.getElementById('taskPopup').classList.remove('open');
    }

    function completeTaskStep(type) {
        setTimeout(() => {
            taskStatus[type] = true;
            document.getElementById(`${type}-indicator`).classList.add('done');
            verifyAllSteps();
        }, 1200);
    }

    function verifyAllSteps() {
        if (taskStatus.yt && taskStatus.tg && taskStatus.wa) {
            setTimeout(() => {
                closeTaskWindow();
                let randomIdx = Math.floor(Math.random() * keysPool.length);
                let finalKey = keysPool[randomIdx];

                document.getElementById('keyNum').innerText = finalKey;
                document.getElementById('statusText').innerText = chosenPlan;
                document.getElementById('verifiedBox').style.display = 'block';
            }, 400);
        }
    }

    function copyKeyText() {
        let text = document.getElementById('keyNum').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ Key Successfully Copied: " + text);
        });
    }
</script>

</body>
</html>
